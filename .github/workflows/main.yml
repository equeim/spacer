name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches:
      - master
      - 'feature/**'
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  build-app:
    runs-on: ubuntu-latest

    env:
      ARTIFACTS_RETENTION_DAYS: ${{ github.event_name == 'schedule' && 30 || 3 }}

    steps:
      - name: Check out
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - name: Add Kotlin problem matcher
        uses: equeim/kotlin-problem-matcher@cd8d50db272bc44d8ecfac02dcc46ec9cd489a49

      - name: Set up Java 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Build the app
        run: |
          ./gradlew build

      - name: Archive debug APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: debug-apk
          path: |
            app/build/outputs/apk/debug/*.apk
          retention-days: ${{ env.ARTIFACTS_RETENTION_DAYS }}

      - name: Archive unsigned release APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-apk
          path: |
            app/build/outputs/apk/release/*.apk
          retention-days: ${{ env.ARTIFACTS_RETENTION_DAYS }}

      - name: Archive test and lint reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: reports
          path: |
            */build/reports/*
          retention-days: ${{ env.ARTIFACTS_RETENTION_DAYS }}

  reuse-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo DEBIAN_FRONTEND=noninteractive apt-get --no-install-recommends --assume-yes install pipx

      - name: Check REUSE compliance
        run: |
          pipx run reuse lint
